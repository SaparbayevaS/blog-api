version: "3.9"

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 settings.asgi:application
    expose:
      - "8000"
    depends_on:
      - redis
    env_file:
      - settings/.env
    volumes:
      - .:/app
      - sqlite_data:/app/db
      - static_data:/app/staticfiles
      - media_data:/app/media

  celery_worker:
    build: .
    command: celery -A settings worker -l info
    depends_on:
      - redis
    env_file:
      - settings/.env
    volumes:
      - .:/app

  celery_beat:
    build: .
    command: celery -A settings beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - redis
    env_file:
      - settings/.env
    volumes:
      - .:/app

  flower:
    build: .
    command: celery -A settings flower --basic-auth=${BLOG_FLOWER_USER}:${BLOG_FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    depends_on:
      - redis
    env_file:
      - settings/.env
    volumes:
      - .:/app

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro

volumes:
  sqlite_data:
  static_data:
  media_data: